<body>
    <main>
        <div class="buttons">
        <input type="button" value="Review Order" id="review" class="btn">
        <input type="button" value="Add Order" id="add" class="btn">
        <input type="button" value="Cancel Order" id="cancel" class="btn">
        <input type="button" value="Send Orders" id="send" class="btn"> 
        </div>

        <div id="one">
        <fieldset id="first">
            <fieldset>
                <legend>Shipping Address</legend>
                <label for="txtID">ID: </label>

                <input type="text" name="textName" id="txtName" /><br>
                <label for="txtCity">City: </label>
                <input type="text" name="textCity" id="txtCity" />
            </fieldset>
            <fieldset>
                <legend>Payment Mathod</legend>
                <input type="radio" name="radPay" value="Credit Card" checked>Credit Card<br>
                <input type="radio" name="radPay" value="Debit Card">Debit Card<br>
                <input type="radio" name="radPay" value="Gift Card">Gift Card
            </fieldset>
            <fieldset>
                <legend>Shipment Method</legend>
                <select name="shipMethod">
                    <option value="Same Day">Same Day</option>
                    <option value="Priority">Priority</option>
                    <option value="Regular Mail">Regular Mail</option>
                </select>
        </fieldset>
        </div>
        <div id="two">
            <fieldset>
                <legend>Shipment Information</legend>
                <textarea name="summary" rows="25" cols="25"></textarea>
            </fieldset>
